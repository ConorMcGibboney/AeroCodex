name: Rust

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade pip pyyaml
      - name: Run Beta 1 automated qualification gate
        run: cargo run -p xtask -- verify beta1-automated --output-dir "${{ runner.temp }}/aerocodex-beta1-automated"
      - name: Upload automated gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aerocodex-beta1-automated-linux
          path: ${{ runner.temp }}/aerocodex-beta1-automated
          if-no-files-found: warn
