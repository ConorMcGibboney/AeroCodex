name: Model admission
description: Propose a new public calculation, model, correlation, solver, or dataset-backed function.
title: "model: "
labels: [model-admission]
body:
  - type: input
    id: codex_id
    attributes:
      label: Proposed Codex ID
      placeholder: gasdyn.normal_shock.p2_over_p1
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source and equation reference
    validations:
      required: true
  - type: textarea
    id: assumptions
    attributes:
      label: Assumptions, validity range, branches, and failure modes
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Proposed tests and tolerances
    validations:
      required: true
