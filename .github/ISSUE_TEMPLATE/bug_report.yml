name: Bug report
description: Report a code, documentation, numerical, or validation issue.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: input
    id: codex_id
    attributes:
      label: Codex ID
      description: Affected Codex ID, if known.
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include inputs, units, expected output, actual output, and version or commit.
    validations:
      required: true
