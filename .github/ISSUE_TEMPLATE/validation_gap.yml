name: Validation gap
description: Track missing, weak, or stale verification and validation evidence.
title: "validation: "
labels: [validation]
body:
  - type: input
    id: codex_id
    attributes:
      label: Codex ID
    validations:
      required: true
  - type: dropdown
    id: evidence_level
    attributes:
      label: Current evidence level
      options:
        - C0 proposed
        - C1 equation-traceable
        - C2 implementation-verified
        - C3 reference-validated
        - C4 experiment-validated
        - CX deprecated or withdrawn
  - type: textarea
    id: gap
    attributes:
      label: Gap description
    validations:
      required: true
