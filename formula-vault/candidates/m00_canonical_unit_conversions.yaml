formula_contract:
  formula_ids:
    - formula_vault.m00.canonical.time_unit_from_mu_du
    - formula_vault.m00.canonical.speed_unit_from_du_tu
    - formula_vault.m00.canonical.speed_unit_from_mu_du
    - formula_vault.m00.canonical.mu_from_units
    - formula_vault.m00.canonical.distance_to_canonical
    - formula_vault.m00.canonical.distance_from_canonical
    - formula_vault.m00.canonical.time_to_canonical
    - formula_vault.m00.canonical.time_from_canonical
    - formula_vault.m00.canonical.speed_to_canonical
    - formula_vault.m00.canonical.speed_from_canonical
  variables:
    - mu
    - distance_unit
    - time_unit
    - distance
    - canonical_distance
    - time
    - canonical_time
    - speed
    - canonical_speed
  units:
    - caller_supplied_consistent_distance_unit
    - caller_supplied_consistent_time_unit
    - caller_supplied_consistent_gravitational_parameter_unit
    - dimensionless_canonical_unit
  coordinate_frames:
    - not_frame_dependent
  time_scales:
    - not_time_scale_dependent
  sign_conventions:
    - unit scales must be finite and strictly positive
    - scalar values being converted may be finite signed values unless the operation computes a unit scale
  valid_domain:
    - finite real scalar inputs only
    - positive distance_unit when used as a scale
    - positive time_unit when used as a scale
    - positive mu when used for canonical unit construction
  singularities:
    - zero distance_unit rejected
    - zero time_unit rejected
    - zero mu rejected for canonical time or speed construction
  invalid_regions:
    - NaN inputs are excluded
    - positive or negative infinity inputs are excluded
    - nonpositive unit scales are excluded
  branch_behavior:
    - single_branch_scalar_algebra
    - no angle endpoint policy
    - no string unit dispatch
    - no frame or epoch interpretation
  tolerance_policy:
    absolute_tolerance: 1.0e-12 for unit-scale deterministic tests
    relative_tolerance: 1.0e-12 for nonzero analytical identity tests
    rationale: finite f64 scalar algebra with exact analytical inverse pairs and canonical mu identity

validation_records:
  required_source_registry_seed: source.formula_vault.m00_canonical_unit_conversions.research_required
  required_validation_card: validation.formula_vault.m00_canonical_unit_conversions
  status: research_required
  status_upgrade_policy: blocked_without_deployment_agent_checks_source_review_equivalence_and_reference_evidence

evidence_plan:
  rust_gates:
    - cargo test -p aero-codex-astrodynamics m00_canonical_unit
    - cargo test --workspace --all-features
    - cargo run -p xtask -- verify formula-vault
    - cargo run -p xtask -- verify equation-inventory
  scilab_equivalence_jobs:
    - future bounded equivalence job for M00 constants/conversions source locator only
  sgp4_reference_checks: []
  analytical_identity_checks:
    - canonical_time_unit_from_mu_du squared equals distance_unit cubed divided by mu
    - canonical_speed_unit_from_du_tu equals distance_unit divided by time_unit
    - canonical_speed_unit_from_mu_du squared equals mu divided by distance_unit
    - canonical_mu_from_units equals one when time_unit is built from the same mu and distance_unit
    - distance, time, and speed conversion pairs round-trip for finite signed values
  reference_oracle_checks:
    - independent scalar dimensional-analysis review before status upgrade
  fixture_hashes: []
  tolerance_rationale: deferred_external_equivalence_pending_future_evidence

promotion_gate:
  default_state: blocked
  required_before_promotion:
    - deployment_agent_confirms_current_main_counts_before_applying_patch
    - source locators rechecked against the registered M07 archive hash
    - no copied M07 constants table or raw source text committed
    - bounded Rust implementation reviewed as independent scalar algebra
    - unit tests cover every new public research kernel
    - equation inventory and formula-vault counts are regenerated on live main
    - validation status remains research_required

