formula_contract:
  formula_ids:
    - formula_vault.m00.vector.dot
    - formula_vault.m00.vector.norm
    - formula_vault.m00.vector.cross
    - formula_vault.m00.vector.unit
    - formula_vault.m00.vector.angle
    - formula_vault.m00.vector.projection
    - formula_vault.m00.vector.scalar_triple
    - formula_vault.m00.vector.vector_triple
    - formula_vault.m00.vector.vector_triple_bac_cab
    - formula_vault.m00.vector.is_collinear
    - formula_vault.m00.vector.is_coplanar
    - formula_vault.m00.vector.tangent_from_dr_ds
    - formula_vault.m00.vector.velocity_from_arc_rate
    - formula_vault.m00.vector.distance
  variables:
    - finite 3-vector inputs named a, b, and c as applicable
    - finite scalar tolerance for predicate helpers
    - finite signed arc-rate scalar for velocity helper
  units:
    - vector component units propagate according to dot, cross, scalar multiplication, and norm rules
    - angle output in radians
    - predicates output booleans
  coordinate_frames:
    - frame-agnostic 3-vector algebra; all input vectors for a call must share a consistent frame
  time_scales:
    - not_time_scale_dependent except velocity_from_arc_rate requires caller-supplied arc-rate units
  sign_conventions:
    - right-handed cross product orientation
    - nonnegative Euclidean norm and distance
    - signed scalar triple product by right-handed orientation
  valid_domain:
    - finite real 3-vector components
    - nonzero vectors for unit, angle, projection target, tangent, and velocity direction operations
    - nonnegative finite tolerance for collinearity and coplanarity predicates
  singularities:
    - zero vector in normalization-like operations
    - zero projection target for projection
    - unresolved rank-deficient least-squares case excluded by leaving app_resolve_coplanar out of this slice
  invalid_regions:
    - non-finite vector components
    - negative or non-finite tolerance
    - non-finite arc rate
  branch_behavior:
    - single analytical branch for dot, norm, cross, projection, triple products, tangent, velocity, and distance
    - boolean threshold branch for collinearity and coplanarity predicates
  tolerance_policy:
    absolute_tolerance: 1.0e-12 for deterministic unit tests unless scale requires looser review
    relative_tolerance: 1.0e-12 for nonzero scalar/vector magnitudes in future equivalence work
    rationale: independent IEEE-754 regression checks first; Scilab equivalence remains pending

