schema_version: 0.1.0
type: object
required:
  - id
  - name
  - crate
  - symbol
  - source
  - model
  - inputs
  - outputs
  - tests
  - failure_modes
  - verification_status
  - validation_status
  - owner
fields:
  id: stable machine-readable Codex ID, for example gasdyn.normal_shock.p2_over_p1
  name: human-readable calculation name
  crate: owning Rust crate
  symbol: public function, type, model, or equation symbol
  source: source title, section, equation, URL, and notes
  model: assumptions and limitations
  inputs: units, domains, and meanings for inputs
  outputs: units and meanings for outputs
  tests: linked unit, property, limit, inverse, or reference tests
  failure_modes: expected errors or warnings for invalid states
  verification_status: C0, C1, C2, C3, C4, or CX
  validation_status: intended-use validation summary
  owner: maintainer or maintainer group
  reviewers: reviewers who approved source, implementation, tests, and validation
