schema_version: 0.1.0
evidence_levels:
  C0:
    name: proposed
    meaning: Entry exists only as a design candidate or experimental API.
  C1:
    name: equation_traceable
    meaning: Source, assumptions, units, and domain are recorded.
  C2:
    name: implementation_verified
    meaning: Tests show implementation computes the stated model correctly.
  C3:
    name: reference_validated
    meaning: Outputs match accepted tables, reference software output, or published benchmark cases within stated tolerances.
  C4:
    name: experiment_validated
    meaning: Model has documented comparison to experimental or flight, wind-tunnel, or bench data within an intended-use envelope.
  CX:
    name: deprecated_or_withdrawn
    meaning: Entry remains indexed for traceability but is not recommended for new use.
