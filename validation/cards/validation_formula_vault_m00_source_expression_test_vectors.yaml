id: validation.formula_vault.m00_source_expression_test_vectors
name: Formula-vault M00 source-expression and test-vector contracts
category: validation
status: research_required
source:
  id: source.formula_vault.m00_source_expression_test_vectors.research_required
  status: research_required
assumptions:
  - Stage 4 Chunk 7F remains metadata/test-contract only; Post-Stage-5 adds only the bounded `m00_wrap2pi` Rust runtime under research_required status.
  - The contract applies only to formula_vault.m00.angle.deg2rad, formula_vault.m00.angle.rad2deg, and formula_vault.m00.angle.wrap2pi.
  - M07 source material remains external and quarantine/reference-only.
  - Raw source text, generated Rust, external fixtures, Scilab output, and alternate public application programming interfaces are not promoted.
domain:
  summary: metadata-only source-expression and test-vector contract for three M00 angle/unit helper candidates
  bounds:
    - finite real scalar inputs only
    - deg2rad and rad2deg are linear unit-conversion contracts
    - wrap2pi records the reviewed interval convention and endpoint test-vector expectations
    - validation status remains research_required after bounded `m00_wrap2pi` runtime deployment until independent equivalence/reference evidence exists
  excluded_cases:
    - no source translation, no generated code import, and no public Rust API beyond the explicitly authorized bounded `m00_wrap2pi` function
    - no Scilab execution result, no SGP4 certification claim, no external oracle fixture import, and no source archive bundling
    - no coverage claim for all M00 rows or all 1,350 M07 represented function rows
    - no certification evidence, no flight-readiness claim, no mission-readiness claim, no operational approval, no medical approval, and no regulated-use approval
inputs:
  - formula-vault/contracts/m00_angle_unit_conversions_contract.yaml
  - formula-vault/candidates/m00_angle_unit_conversions.yaml
  - formula-vault/manifests/m00_angle_unit_conversions_manifest.yaml
  - docs/assurance/formula_vault_m00_source_expression_test_vectors.md
  - existing M07 data-governance artifact stage4.m07_rust_port_v14.2026_06_15
outputs:
  - independently written mathematical contract summaries for deg2rad, rad2deg, and wrap2pi
  - finite-domain, invalid-input, tolerance-policy, and reference-oracle metadata
  - endpoint-sensitive wrap2pi test-vector contract
  - bounded `m00_wrap2pi` runtime deployment gate plus blocked-by-default status-upgrade gate
  - research_required validation metadata for this contract
tests:
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify equation-inventory
  - cargo run -p xtask -- verify cards
  - cargo run -p xtask -- verify source-registry
  - cargo run -p xtask -- verify data-registry
  - final source-boundary scan confirms no M07 code, archive, fixture, generated formula code, alternate public API, root cargo lockfile, or local absolute path was promoted beyond the explicitly authorized `m00_wrap2pi` crate change
failure_modes:
  - future status upgrade treats this metadata as approval without independent equivalence/reference evidence
  - future implementation collapses wrap2pi endpoint behavior into an unreviewed interval convention
  - future candidate must not treat the M07 archive as bundled implementation source
  - documentation is misread even though it provides no certification evidence, no readiness evidence, no operational approval, no medical approval, and no regulated-use approval
notes: "Stage 4 Chunk 7F validation card for M00 source-expression and test-vector metadata plus Post-Stage-5 bounded m00_wrap2pi runtime traceability. This card does not import M07 code, run Scilab/SGP4 checks, create alternate public application programming interfaces, upgrade research_required status, or approve operational use."
