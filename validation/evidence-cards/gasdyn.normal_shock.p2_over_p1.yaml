id: gasdyn.normal_shock.p2_over_p1
name: Normal shock static pressure ratio
crate: aero-codex-gasdynamics
symbol: normal_shock_p2_over_p1
source:
  title: NACA Report 1135
  section: Normal shock relations
  equation: TBD
  url: https://www.grc.nasa.gov/www/k-12/airplane/Images/naca1135.pdf
  notes: Founder baseline card; equation section and reference-table validation to be finalized before C3.
model:
  assumptions:
    - steady flow
    - inviscid discontinuity
    - one-dimensional control volume
    - calorically perfect gas
  limitations:
    - no real-gas correction
    - no viscous shock structure
    - no reacting flow
inputs:
  mach1:
    unit: dimensionless
    type: Mach
    domain: [1.000001, 50.0]
  gamma:
    unit: dimensionless
    type: RatioOfSpecificHeats
    domain: [1.01, 2.0]
outputs:
  p2_over_p1:
    unit: dimensionless
    type: Ratio
    meaning: downstream static pressure divided by upstream static pressure
tests:
  - id: gasdyn.normal_shock.p2_over_p1.example.mach_two_air
    type: unit
    condition: mach1 = 2.0, gamma = 1.4
    expected: p2_over_p1 = 4.5
    tolerance_abs: 1.0e-12
  - id: gasdyn.normal_shock.p2_over_p1.limit.mach_one
    type: limit
    condition: mach1 -> 1+
    expected: p2_over_p1 -> 1
  - id: gasdyn.normal_shock.p2_over_p1.property.monotonic
    type: property
    condition: mach1 > 1 and gamma > 1
    expected: increasing in mach1
failure_modes:
  - condition: mach1 <= 1
    error: RequiresSupersonic
verification_status: C2_implementation_verified
validation_status: reference_model_only
owner: aero-codex-gasdynamics-maintainers
reviewers: []
